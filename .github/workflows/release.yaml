name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ─── LINUX ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign artifacts
        run: |
          cd src-tauri/target/release/bundle
          for f in appimage/*.AppImage deb/*.deb; do
            gpg --batch --yes \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --pinentry-mode loopback \
              --detach-sign --armor "$f"
          done

      - name: Generate checksums
        run: |
          cd src-tauri/target/release/bundle
          sha256sum appimage/*.AppImage deb/*.deb > checksums-linux.txt
          cat checksums-linux.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.asc
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.asc
            src-tauri/target/release/bundle/checksums-linux.txt

  # ─── WINDOWS (unsigned) ───────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Generate checksum
        run: |
          $file = Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | Select-Object -First 1
          $hash = Get-FileHash $file.FullName -Algorithm SHA256
          "$($hash.Hash)  $($file.Name)" | Out-File -FilePath checksums-windows.txt -Encoding utf8
          Get-Content checksums-windows.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            checksums-windows.txt

  # ─── MACOS (stub — pending Apple Developer Program) ──────────────────────
  # build-macos:
  #   Uncomment and complete once Apple Developer ID cert is active.
  #   Requires secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
  #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID

  # ─── RELEASE ──────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Merge checksums
        run: |
          cat artifacts/**/checksums-*.txt > artifacts/checksums.txt
          cat artifacts/checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.asc
            artifacts/**/*.deb
            artifacts/**/*.deb.asc
            artifacts/**/*.exe
            artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}